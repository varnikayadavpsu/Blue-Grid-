<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blue Grid — A Civic Water Atlas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,650&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper: #f3ecd9;
      --ink: #1d3342;
      --navy: #243f51;
      --teal: #4f7f79;
      --moss: #596b50;
      --cream: #fbf5e7;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      min-height: 100%;
      background: var(--paper);
    }

    body {
      min-height: 100vh;
      font-family: Inter, system-ui, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 18% 14%, rgba(255, 252, 236, 0.82), transparent 24rem),
        radial-gradient(circle at 85% 92%, rgba(116, 138, 106, 0.24), transparent 28rem),
        linear-gradient(135deg, #f7efd9 0%, #efe2c3 52%, #d5c7a6 100%);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: 0.32;
      background-image:
        linear-gradient(90deg, rgba(55, 42, 24, 0.055) 1px, transparent 1px),
        linear-gradient(rgba(55, 42, 24, 0.045) 1px, transparent 1px),
        radial-gradient(circle at 30% 20%, rgba(255, 255, 255, 0.34) 0 1px, transparent 1px);
      background-size: 19px 19px, 23px 23px, 7px 7px;
      mix-blend-mode: multiply;
    }

    .page {
      position: relative;
      min-height: 100vh;
      isolation: isolate;
      overflow: hidden;
    }

    .map-illustration {
      position: absolute;
      inset: 0;
      z-index: -2;
      background-image: url("assets/kitchener-watercolor-map.png");
      background-size: cover;
      background-position: center right;
      filter: saturate(0.92) contrast(0.94);
      transform: scale(1.015);
    }

    .page::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      background:
        linear-gradient(90deg, rgba(247, 239, 217, 0.98) 0%, rgba(247, 239, 217, 0.89) 33%, rgba(247, 239, 217, 0.45) 62%, rgba(247, 239, 217, 0.12) 100%),
        linear-gradient(180deg, rgba(247, 239, 217, 0.76) 0%, rgba(247, 239, 217, 0.08) 42%, rgba(62, 77, 63, 0.14) 100%);
    }

    .page::after {
      content: "";
      position: absolute;
      left: -8vw;
      bottom: -15vw;
      width: 54vw;
      height: 26vw;
      z-index: -1;
      background: rgba(133, 151, 119, 0.18);
      border-radius: 47% 53% 49% 51% / 58% 41% 59% 42%;
      filter: blur(1px);
    }

    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 32px;
      width: min(1180px, calc(100% - 48px));
      margin: 0 auto;
      padding: 28px 0 0;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      color: var(--navy);
      text-decoration: none;
      font-family: "Fraunces", "Cormorant Garamond", serif;
      font-size: 23px;
      font-weight: 650;
      letter-spacing: 0.02em;
    }

    .brand-mark {
      width: 34px;
      height: 34px;
      border: 1px solid rgba(36, 63, 81, 0.55);
      border-radius: 50% 46% 52% 44%;
      position: relative;
      background: rgba(251, 245, 231, 0.56);
    }

    .brand-mark::before,
    .brand-mark::after {
      content: "";
      position: absolute;
      left: 8px;
      right: 8px;
      height: 1px;
      background: rgba(79, 127, 121, 0.82);
      transform: rotate(-18deg);
    }

    .brand-mark::before {
      top: 12px;
    }

    .brand-mark::after {
      top: 20px;
    }

    .nav-link {
      color: rgba(29, 51, 66, 0.78);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-decoration: none;
      text-underline-offset: 5px;
      text-transform: uppercase;
    }

    .nav-link:hover {
      color: var(--ink);
      text-decoration: underline;
    }

    .hero {
      width: min(1180px, calc(100% - 48px));
      min-height: calc(100vh - 72px);
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(0, 0.96fr) minmax(280px, 0.74fr);
      align-items: center;
      gap: 42px;
      padding: 48px 0 70px;
    }

    .hero-copy {
      max-width: 690px;
      padding-top: 18px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      color: var(--moss);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .eyebrow::before {
      content: "";
      width: 42px;
      height: 1px;
      background: rgba(89, 107, 80, 0.62);
    }

    h1 {
      max-width: 760px;
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: clamp(4.4rem, 9vw, 8.4rem);
      font-weight: 600;
      line-height: 0.86;
      color: #1f3440;
    }

    .subheadline {
      max-width: 550px;
      margin-top: 30px;
      color: rgba(29, 51, 66, 0.82);
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: clamp(1.45rem, 2.2vw, 2rem);
      font-weight: 500;
      line-height: 1.28;
    }

    .hero-actions {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-top: 42px;
    }

    .cta {
      display: inline-flex;
      align-items: center;
      min-height: 50px;
      padding: 0 23px;
      border: 1px solid rgba(36, 63, 81, 0.62);
      border-radius: 999px;
      color: var(--cream);
      background: #263f4d;
      font-family: "Fraunces", Georgia, serif;
      font-size: 16px;
      font-weight: 500;
      text-decoration: none;
      transition: background 180ms ease, border-color 180ms ease, transform 180ms ease;
    }

    .cta:hover {
      background: #1c303b;
      border-color: #1c303b;
      transform: translateY(-1px);
    }

    @media (max-width: 860px) {
      .page::before {
        background:
          linear-gradient(180deg, rgba(247, 239, 217, 0.96) 0%, rgba(247, 239, 217, 0.85) 47%, rgba(247, 239, 217, 0.24) 100%);
      }

      .map-illustration {
        background-position: 64% center;
        opacity: 0.82;
      }

      .site-header {
        width: min(100% - 32px, 1180px);
        padding-top: 22px;
      }

      .nav-link {
        font-size: 11px;
      }

      .hero {
        width: min(100% - 32px, 1180px);
        min-height: auto;
        grid-template-columns: 1fr;
        gap: 34px;
        padding: 76px 0 42px;
      }

      h1 {
        font-size: clamp(4rem, 18vw, 6.4rem);
      }

      .hero-actions {
        align-items: flex-start;
        flex-direction: column;
      }
    }

    @media (max-width: 560px) {
      .brand {
        font-size: 20px;
      }

      .brand-mark {
        width: 30px;
        height: 30px;
      }

      .hero {
        padding-top: 58px;
      }

      .eyebrow {
        font-size: 11px;
        margin-bottom: 20px;
      }

      h1 {
        line-height: 0.9;
      }

      .subheadline {
        margin-top: 24px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="map-illustration" aria-hidden="true"></div>

    <header class="site-header" aria-label="Site navigation">
      <a class="brand" href="/" aria-label="Blue Grid home">
        <span class="brand-mark" aria-hidden="true"></span>
        <span>Blue Grid</span>
      </a>
      <a class="nav-link" href="/dashboard">City Atlas</a>
    </header>

    <section class="hero" aria-labelledby="hero-title">
      <div class="hero-copy">
        <p class="eyebrow">Kitchener Water Archive</p>
        <h1 id="hero-title">The city remembers every water main break.</h1>
        <p class="subheadline">Blue Grid learns from that history to help cities act before the next failure happens.</p>
        <div class="hero-actions">
          <a class="cta" href="/dashboard">View The City &rarr;</a>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
